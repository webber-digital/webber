<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Webber Portfolio | Our Work</title>
<meta name="description" content="Check out websites built by Webber. Gym, salon and small business websites.">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:black; color:white; }

.luxury { font-family: 'Playfair Display', serif; }

.fade { opacity:0; transform:translateY(40px); transition:0.8s; }
.fade.show { opacity:1; transform:translateY(0); }

.card {
  transition: all 0.4s ease;
}
.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 25px rgba(255,255,255,0.1);
}

.btn:hover {
  transform: scale(1.08);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="fixed top-0 w-full flex justify-between items-center px-6 py-4 bg-black/70 backdrop-blur z-50">

  <div class="flex items-center gap-2">
    <span class="tracking-[4px] text-sm">WEBBER</span>
  </div>

  <a href="index.html"
  class="border px-4 py-2 rounded-full text-sm hover:bg-white hover:text-black transition">
  Home
  </a>

</div>

<!-- HERO -->
<section class="pt-32 pb-16 text-center fade">
  <h1 class="text-5xl luxury mb-4">Our Portfolio</h1>
  <p class="text-gray-400">Websites that actually bring clients</p>
</section>

<!-- PROJECTS -->
<section class="px-6 pb-20 fade">

  <div class="grid md:grid-cols-2 gap-8 max-w-5xl mx-auto">

    <!-- SALON PROJECT -->
    <div class="card border p-6 rounded-xl text-center">
      <h2 class="text-2xl mb-2">Hair Style Zone</h2>
      <p class="text-gray-400 mb-4">Modern salon website demo</p>

      <a href="https://hairstylezone.vercel.app/#" target="_blank"
      class="inline-block bg-white text-black px-6 py-2 rounded-full btn">
      View Website
      </a>
    </div>

    <!-- FUTURE PROJECT -->
    <div class="card border p-6 rounded-xl text-center">
      <h2 class="text-2xl mb-2">Gym Website</h2>
      <p class="text-gray-400 mb-4">Coming soon...</p>

      <button class="border px-6 py-2 rounded-full text-gray-400">
      Preview Soon
      </button>
    </div>

  </div>

</section>

<!-- CTA -->
<section class="py-20 text-center border-t border-gray-800 fade">
  <h2 class="text-3xl mb-4">Want a Website Like This?</h2>

  <a href="https://instagram.com/webber.we" target="_blank"
  class="bg-white text-black px-8 py-3 rounded-full btn">
  DM Now
  </a>
</section>

<!-- SCRIPT -->
<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});
document.querySelectorAll('.fade').forEach(el => observer.observe(el));
</script>

</body>
    </html>
