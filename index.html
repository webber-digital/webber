<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Webber | Gym Website Design India | Small Business Website Developer</title>

<meta name="description" content="Webber builds high-converting gym and small business websites in India. Affordable pricing starting ₹1499.">

<link rel="icon" type="image/png" href="https://webber-we.vercel.app/favicon.png?v=6">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
.luxury { font-family: 'Playfair Display', serif; }

.gold {
  background: linear-gradient(90deg,#D4AF37,#FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.fade { opacity: 0; transform: translateY(30px); transition: 0.8s; }
.fade.show { opacity: 1; transform: translateY(0); }

/* FAB BUTTON */
.fab {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 60px;
  height: 60px;
  background: white;
  color: black;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
  transition: 0.3s;
}
.fab:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(255,255,255,0.4);
}

/* MENU */
.fab-menu {
  position: fixed;
  bottom: 100px;
  right: 30px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.fab-menu.show {
  opacity: 1;
  pointer-events: auto;
}

.fab-menu a {
  background: black;
  color: white;
  border: 1px solid #555;
  padding: 10px 16px;
  border-radius: 999px;
  text-align: center;
  transition: 0.3s;
}
.fab-menu a:hover {
  background: white;
  color: black;
}
</style>
</head>

<body class="bg-black text-white">

<!-- NAV -->
<div class="fixed top-0 w-full flex justify-between items-center px-6 py-4 bg-black/70 backdrop-blur z-50">
  
  <div class="flex items-center gap-2">
    <img src="IMG_20260503_134348_926.webp" class="h-8" alt="Webber Logo">
    <span class="tracking-[4px] text-sm">WEBBER</span>
  </div>

</div>

<!-- HERO -->
<section class="h-screen flex flex-col justify-center items-center text-center px-6 fade">

  <img src="IMG_20260503_134348_926.webp" class="h-24 mb-6" alt="Webber Logo">

  <h1 class="text-5xl md:text-6xl luxury mb-4">
    Gym & Small Business <span class="gold">Website Developer</span>
  </h1>

  <p class="text-gray-400 max-w-xl mb-8">
    Webber builds affordable, high-converting websites for gyms and small businesses in India.
  </p>

</section>

<!-- FLOATING BUTTON -->
<div class="fab" onclick="toggleMenu()">+</div>

<!-- MENU OPTIONS -->
<div id="menu" class="fab-menu">
  <a href="portfolio.html">Portfolio</a>
  <a href="service.html">Pricing</a>
  <a href="https://instagram.com/webber.we" target="_blank">DM</a>
</div>

<!-- SCRIPT -->
<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});
document.querySelectorAll('.fade').forEach(el => observer.observe(el));
</script>

</body>
</html>
